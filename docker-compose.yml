services:
  db:
    image: mongo:6
    restart: always
    volumes:
      - /data/mongo_data:/data/db

  redis:
    image: redis:7
    restart: always

  api:
    build:
      context: backend/
      target: api-dist
    image: morphly-api
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: ${MONGODB_URL:-mongodb://db:27017/morphly}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      - db
      - redis

  celery_worker:
    build:
      context: backend/
      target: scraper-dist
    image: morphly-scraper
    command: celery -A app.worker.celery_app worker --loglevel=info
    environment:
      MONGODB_URL: ${MONGODB_URL:-mongodb://db:27017/morphly}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      - db
      - redis

  celery_beat:
    build:
      context: backend/
      target: api-dist
    image: morphly-api # Reuses the lightweight image
    command: celery -A app.worker.celery_app beat --loglevel=info
    environment:
      MONGODB_URL: ${MONGODB_URL:-mongodb://db:27017/morphly}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      - db
      - redis

  frontend:
    build: frontend/
    image: morphly-frontend
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://api:8000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
    depends_on:
      - api

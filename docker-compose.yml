version: "3.8"

services:
  db:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: backend/
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/backend
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://db:27017
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  celery_worker:
    build: backend/
    command: celery -A app.worker.celery_app worker --loglevel=info
    volumes:
      - ./backend:/backend
    environment:
      - MONGODB_URL=mongodb://db:27017
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

volumes:
  mongo_data:

version: "3.8"

services:
  db:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: backend/
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://db:27017
      - REDIS_URL=redis://redis:6379/0
      - BACKEND_CORS_ORIGINS=["http://localhost:3000","http://frontend:3000"]
    depends_on:
      - db
      - redis

  celery_worker:
    build: backend/
    command: celery -A app.worker.celery_app worker --loglevel=info
    environment:
      - MONGODB_URL=mongodb://db:27017
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  frontend:
    build: frontend/
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://api:8000}
      - BACKEND_URL=${BACKEND_URL:-http://api:8000}
    depends_on:
      - api

volumes:
  mongo_data:
